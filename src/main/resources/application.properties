# APPLICATION CONFIGURATIONS
spring.application.name=spring-rest-project

# DATABASE CONFIGURATIONS
spring.datasource.url=jdbc:postgresql://localhost:5432/${LOCAL_DB_NAME}
spring.datasource.username=${LOCAL_DB_USER}
spring.datasource.password=${LOCAL_DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

#0AUTH TOKEN SECRET KEY
app.jwt.secret=${app.jwt.secret}

# JPA / HIBERNATE CONFIGURATIONS
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# HTTP SESSION CONFIGURATIONS
spring.session.jdbc.initialize-schema=always

# INITIALIZER / SEED DATA PROPERTIES
spring.profiles.include=local
app.admin.username=${APP_ADMIN_USER}
app.admin.password=${APP_ADMIN_PASS}

# LOCALE MESSAGE CONFIGS
spring.messages.basename=messages/messages
spring.messages.fallback-to-system-locale=false

#HEALTH CONFIGS
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

#REDIS CONFIGS
spring.data.redis.host=localhost
spring.data.redis.port=6379

#FLYWAY CONFIGS
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
